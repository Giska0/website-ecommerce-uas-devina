<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | GYSÉ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">

</head>

<body>

<header>

    <div class="logo">
        <h1>GYSÉ</h1>
        <p>Glow Your Skin Everyday.</p>
    </div>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
    </nav>

    <div class="nav-actions">

        <a href="cart.html" class="cart-btn">
            <i class="fa-solid fa-cart-shopping"></i>
            Cart
            <span id="cart-count">(0)</span>
        </a>

        <a href="admin.html" class="admin-link">
            Admin
        </a>

    </div>

</header>

<section class="checkout-container">

    <h1>Checkout</h1>

    <form id="checkoutForm">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone" required>
        </div>

        <div class="input-group">
            <label>Shipping Address</label>
            <textarea id="address" rows="4" required></textarea>
        </div>

        <div class="input-group">

            <label>Payment Method</label>

            <select id="paymentMethod" required>

                <option value="">-- Select Payment Method --</option>

                <option value="qris">QRIS</option>

                <option value="ewallet">E-Wallet</option>

                <option value="bank">Transfer Bank</option>

                <option value="cod">Cash On Delivery</option>

            </select>

        </div>

        <div id="paymentDetail"></div>

        <div class="input-group">
            <label>Voucher Code</label>
            <div class="voucher-input">
                <input
                    type="text"
                    id="voucherCode"
                    placeholder="Enter voucher code">
                <button
                    type="button"
                    id="applyVoucher">
                    Apply
                </button>
            </div>
            <small id="voucherMessage"></small>
        </div>

        <div class="order-summary">

            <h3>Order Summary</h3>

            <div class="summary-item">
                <span>Subtotal</span>
                <span id="subtotalPrice">Rp0</span>
            </div>

            <div class="summary-item">
                <span>Shipping</span>
                <span id="shippingPrice">Rp15.000</span>
            </div>

            <div class="summary-item">
                <span>Admin Fee</span>
                <span id="adminPrice">Rp0</span>
            </div>

            <hr>

            <div class="summary-item total">
                <strong>Total</strong>
                <strong id="totalPrice">Rp0</strong>
            </div>

        </div>

        <button type="submit">

            Place Order

        </button>

    </form>

</section>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/checkout.js"></script>
<script src="js/animations.js"></script>

</body>

</html>

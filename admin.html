<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GYSÉ Admin</title>

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

    <div class="admin-container">

        <div class="admin-topbar">

            <div>
                <h1>GYSÉ Admin Panel</h1>
                <p>Manage Products</p>
            </div>

            <a href="index.html" class="customer-mode-btn">
                🛍 Customer Mode
            </a>

        </div>

        <button id="addProductBtn">
            + Add Product
        </button>

        <div id="addModal" class="modal">

            <div class="modal-content">

                <span class="close-add">&times;</span>

                <h2>Add Product</h2>

                <div class="input-group">
                    <label>Brand</label>
                    <input type="text" id="newBrand" placeholder="contoh: Skintific">
                </div>

                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="newName">
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <select id="newCategory">
                        <option>Skincare</option>
                        <option>Makeup</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Price</label>
                    <input type="number" id="newPrice">
                </div>

                <div class="input-group">
                    <label>Stock</label>
                    <input type="number" id="newStock">
                </div>

                <div class="input-group">
                    <label>Image</label>
                    <input type="text" id="newImage" placeholder="contoh: images/serum.jpeg">
                </div>

                <div class="input-group">
                    <label>Product Description</label>
                    <textarea id="newDescription" rows="3" placeholder="Deskripsi singkat produk..."></textarea>
                </div>

                <button id="addBtn">
                    Add Product
                </button>

            </div>

        </div>

        <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th>No</th>

                    <th>Product</th>

                    <th>Category</th>

                    <th>Price</th>

                    <th>Stock</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="productTable">

            </tbody>

        </table>

        </div>

       <div id="editForm" class="modal">

            <div class="modal-content">

                <span class="close-btn">&times;</span>

            <h2>Edit Product</h2>

            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="editName">
            </div>

            <div class="input-group">
                <label>Price</label>
                <input type="number" id="editPrice">
            </div>

            <div class="input-group">
                <label>Stock</label>
                <input type="number" id="editStock">
            </div>

            <button id="saveBtn">
                Save Changes
            </button>

            </div>

        </div>

        <div id="deleteModal" class="modal">

            <div class="modal-content">

                <h2>Delete Product</h2>

                <p style="margin:20px 0;">
                    Are you sure you want to delete this product?
                </p>

                <div style="display:flex; gap:10px; justify-content:flex-end;">

                    <button id="cancelDelete">
                        Cancel
                    </button>

                    <button id="confirmDelete"
                    style="background:#e74c3c;">
                        Delete
                    </button>

                </div>

            </div>

        </div>

    </div>

<script src="js/data.js"></script>
<script src="js/admin.js"></script>
<script src="js/animations.js"></script>

</body>
</html>
